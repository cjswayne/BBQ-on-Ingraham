services:
  - type: web
    name: barbecue-mondays
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: ADMIN_PHONES
        sync: false
      - key: DEFAULT_COUNTRY_CODE
        value: +1
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_VERIFY_SERVICE_SID
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_UPLOAD_PRESET
        sync: false
      - key: VITE_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: VITE_CLOUDINARY_UPLOAD_PRESET
        sync: false
      - key: EMAIL_NOTIFICATIONS_ENABLED
        value: "true"
      - key: ADMIN_NOTIFICATION_EMAILS
        sync: false
      - key: GCP_SA_EMAIL
        sync: false
      - key: GCP_SA_PRIVATE_KEY
        sync: false
      - key: DELEGATION_USER
        sync: false
      - key: SEND_AS_ALIAS
        sync: false
